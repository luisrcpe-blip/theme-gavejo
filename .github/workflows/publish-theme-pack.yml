name: Publish Theme Pack

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: theme-pack-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate template contract
        run: npm run check:contract

      - name: Build static theme app
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Attach Nuklo manifest
        run: node scripts/prepare-pages.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Sync Nuklo Theme Pack
        run: |
          if [ -z "$NUKLO_THEME_SYNC_SECRET" ]; then
            echo "NUKLO_THEME_SYNC_SECRET is not configured; skipping Nuklo theme-pack sync."
            exit 0
          fi

          MANIFEST_URL="${{ steps.deployment.outputs.page_url }}nuklo.template.json"
          curl -fsS -X POST "https://gavejo.nuklo.cloud/api/internal/theme-packs/sync" \
            -H "Authorization: Bearer $NUKLO_THEME_SYNC_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"manifestUrl\":\"${MANIFEST_URL}\",\"status\":\"active\"}"
        env:
          NUKLO_THEME_SYNC_SECRET: ${{ secrets.NUKLO_THEME_SYNC_SECRET }}
